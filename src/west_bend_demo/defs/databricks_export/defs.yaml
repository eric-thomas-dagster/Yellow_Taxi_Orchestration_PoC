type: west_bend_demo.components.DatabricksNotebookComponent

attributes:
  workspace_host: "https://your-workspace.cloud.databricks.com"
  # token: Set via DATABRICKS_TOKEN env var, or uncomment and set here
  # cluster_id: "0123-456789-abcdefgh"  # Set to your existing cluster ID
  environment: "qa_poc"
  demo_mode: true
  poll_interval_seconds: 10
  max_wait_time_seconds: 3600
  notebooks:
    # Monthly export of aggregated data
    # Notebook reads AGG_MONTHLY_ZONE_SUMMARY_{YEAR}_{MONTH}.parquet from
    # ADLS outbound container, coalesces to single CSV, writes to
    # Unity Catalog data_feed Volume
    - notebook_path: "/Repos/orchestration-poc/databricks/export_aggregate_data"
      asset_key: "export_aggregate_data"
      group_name: "databricks_export"
      description: >
        Exports AGG_MONTHLY_ZONE_SUMMARY from the Snowflake MRT layer.
        Reads {YEAR}_{MONTH} parquet from ADLS outbound staging area,
        coalesces to a single CSV file, writes to Unity Catalog data_feed
        Volume on Azure File Share. Partitioned monthly to match the
        upstream data processing window.
      partitioned: true
      kinds: ["databricks", "python", "snowflake", "azure"]
      deps: ["mrt/agg_monthly_zone_summary"]
      notebook_params:
        SOURCE_TABLE: "AGG_MONTHLY_ZONE_SUMMARY"
        STORAGE_ACCOUNT: "youradlsaccount"
        CONTAINER: "outbound"
